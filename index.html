<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BeatForge Drum Machine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --accent: #6c5ce7;
            --accent-glow: #a29bfe;
            --accent-bright: #fd79a8;
            --text-primary: #f0f0f5;
            --text-secondary: #8888aa;
            --pad-default: #1e1e35;
            --pad-active: #6c5ce7;
            --success: #00cec9;
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 20px 16px 10px;
            text-align: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-bright));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .status-bar {
            width: 100%;
            max-width: 500px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .status-dot.ready {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-dot.loading {
            background: #fdcb6e;
            animation: pulse-dot 1s infinite;
        }

        .status-dot.error {
            background: #e17055;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-control svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            border-radius: 2px;
            background: #333;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-glow);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(108, 92, 231, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-glow);
            cursor: pointer;
            border: none;
        }

        .bank-selector {
            width: 100%;
            max-width: 500px;
            padding: 0 16px;
            margin-bottom: 12px;
        }

        .bank-tabs {
            display: flex;
            gap: 6px;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 4px;
        }

        .bank-tab {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .bank-tab::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            opacity: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-bright));
            transition: opacity 0.3s;
        }

        .bank-tab span {
            position: relative;
            z-index: 1;
        }

        .bank-tab.active {
            color: #fff;
        }

        .bank-tab.active::before {
            opacity: 1;
        }

        .bank-tab:active {
            transform: scale(0.96);
        }

        .pads-container {
            width: 100%;
            max-width: 500px;
            padding: 0 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* === CHANGED: 4 rows instead of 2, 1:1 aspect ratio === */
        .pads-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            aspect-ratio: 1 / 1;
        }

        .pad {
            position: relative;
            border: none;
            border-radius: 16px;
            background: var(--pad-default);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .pad .pad-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            z-index: 2;
            transition: color 0.2s;
        }

        /* Removed .pad-icon styles — no more emoji icons */

        .pad::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.15s ease;
            background: radial-gradient(circle at center, var(--accent-glow), var(--accent));
        }

        .pad::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
            opacity: 0;
        }

        .pad.pressed {
            transform: scale(0.93);
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.4), inset 0 0 20px rgba(108, 92, 231, 0.2);
        }

        .pad.pressed::before {
            opacity: 1;
        }

        .pad.pressed::after {
            width: 200%;
            height: 200%;
            opacity: 0;
        }

        .pad.pressed .pad-label {
            color: #fff;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0);
            animation: ripple-anim 0.5s ease-out;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .keyboard-hints {
            width: 100%;
            max-width: 500px;
            padding: 16px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.6;
            line-height: 1.8;
        }

        .keyboard-hints kbd {
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid #444;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.65rem;
            background: #222;
            margin: 0 1px;
        }

        footer {
            width: 100%;
            max-width: 500px;
            padding: 10px 16px 20px;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
            opacity: 0.4;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }

        .visualizer {
            width: 100%;
            max-width: 500px;
            padding: 0 16px;
            margin-bottom: 8px;
        }

        .visualizer canvas {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            opacity: 0.5;
        }

        @media (max-height: 600px) {
            .pads-grid {
                aspect-ratio: auto;
                gap: 8px;
            }

            .pad {
                padding: 8px;
            }
        }

        @media (min-width: 500px) {
            .pads-grid {
                gap: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
        <div class="loading-text">LOADING</div>
    </div>

    <header>
        <div class="logo">⬡ SHIGSCAPE ⬡ </div>
        <div class="subtitle">Drum Machine</div>
    </header>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot loading" id="statusDot"></div>
            <span id="statusText">Loading sounds...</span>
        </div>
        <div class="volume-control">
            <svg viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73
2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49
7-8.77s-2.99-7.86-7-8.77z" />
            </svg>
            <input type="range" id="volumeSlider" min="0" max="100" value="80">
        </div>
    </div>

    <div class="bank-selector">
        <div class="bank-tabs" id="bankTabs"></div>
    </div>

    <div class="visualizer">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="pads-container">
        <div class="pads-grid" id="padsGrid"></div>
    </div>

    <!-- === CHANGED: 16 keys shown in 4 rows of 4 === -->
    <div class="keyboard-hints">
        Keyboard: <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> ·
        <kbd>Q</kbd><kbd>W</kbd><kbd>E</kbd><kbd>R</kbd><br>
        <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd> ·
        <kbd>Z</kbd><kbd>X</kbd><kbd>C</kbd><kbd>V</kbd>
    </div>

    <footer>Tap pads or use keyboard · Add your sounds to the sounds/ folder</footer>

    <script>
        /*
           SOUND FILE SETUP GUIDE
        
           1. Create a folder named "sounds" in the same
              directory as this HTML file.
        
           2. Inside "sounds/", create subfolders for each
              bank: "classic", "electronic", "808", etc.
        
           3. Each bank needs exactly 16 audio files named:
              pad1.wav through pad16.wav
        
           4. Supported formats: WAV (recommended), MP3,
              OGG, FLAC. WAV gives lowest latency.
        
           5. Keep files short (1-2 seconds max) for
              faster loading and minimal memory usage.
        */

        const SOUNDBANKS = {
            classic: {
                name: 'Classic',
                sounds: [
                    'sounds/classic/pad1.wav', 'sounds/classic/pad2.wav',
                    'sounds/classic/pad3.wav', 'sounds/classic/pad4.wav',
                    'sounds/classic/pad5.wav', 'sounds/classic/pad6.wav',
                    'sounds/classic/pad7.wav', 'sounds/classic/pad8.wav',
                    'sounds/classic/pad9.wav', 'sounds/classic/pad10.wav',
                    'sounds/classic/pad11.wav', 'sounds/classic/pad12.wav',
                    'sounds/classic/pad13.wav', 'sounds/classic/pad14.wav',
                    'sounds/classic/pad15.wav', 'sounds/classic/pad16.wav',
                ]
            },
            electronic: {
                name: 'Electronic',
                sounds: [
                    'sounds/electronic/pad1.wav', 'sounds/electronic/pad2.wav',
                    'sounds/electronic/pad3.wav', 'sounds/electronic/pad4.wav',
                    'sounds/electronic/pad5.wav', 'sounds/electronic/pad6.wav',
                    'sounds/electronic/pad7.wav', 'sounds/electronic/pad8.wav',
                    'sounds/electronic/pad9.wav', 'sounds/electronic/pad10.wav',
                    'sounds/electronic/pad11.wav', 'sounds/electronic/pad12.wav',
                    'sounds/electronic/pad13.wav', 'sounds/electronic/pad14.wav',
                    'sounds/electronic/pad15.wav', 'sounds/electronic/pad16.wav',
                ]
            },
            eighties: {
                name: '808',
                sounds: [
                    'sounds/808/pad1.wav', 'sounds/808/pad2.wav',
                    'sounds/808/pad3.wav', 'sounds/808/pad4.wav',
                    'sounds/808/pad5.wav', 'sounds/808/pad6.wav',
                    'sounds/808/pad7.wav', 'sounds/808/pad8.wav',
                    'sounds/808/pad9.wav', 'sounds/808/pad10.wav',
                    'sounds/808/pad11.wav', 'sounds/808/pad12.wav',
                    'sounds/808/pad13.wav', 'sounds/808/pad14.wav',
                    'sounds/808/pad15.wav', 'sounds/808/pad16.wav',
                ]
            }
        };

        class DrumMachine {
            constructor() {
                this.audioCtx = null;
                this.masterGain = null;
                this.analyser = null;
                this.buffers = {};
                this.currentBank = null;
                this.loadedBanks = new Set();
                this.volume = 0.8;
                this.isInitialized = false;
                this.pads = [];
                this.visualizerCtx = null;
                this.animFrameId = null;
                this.init();
            }

            async init() {
                this.setupAudio();
                this.setupUI();
                this.setupKeyboard();
                this.setupVisualizer();
                const firstBank = Object.keys(SOUNDBANKS)[0];
                await this.loadBank(firstBank);
                this.currentBank = firstBank;
                this.updateActiveTab(firstBank);
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 600);
            }

            setupAudio() {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                this.audioCtx = new AudioCtx();
                this.masterGain = this.audioCtx.createGain();
                this.masterGain.gain.value = this.volume;
                this.analyser = this.audioCtx.createAnalyser();
                this.analyser.fftSize = 256;
                this.masterGain.connect(this.analyser);
                this.analyser.connect(this.audioCtx.destination);
            }

            setupUI() {
                const tabsContainer = document.getElementById('bankTabs');
                const gridContainer = document.getElementById('padsGrid');

                // Object.entries(SOUNDBANKS).forEach(([key, bank]) => {
                //     const tab = document.createElement('button');
                //     tab.className = 'bank-tab';
                //     tab.dataset.bank = key;
                //     tab.innerHTML = `<span>${bank.name}</span>`;
                //     tab.addEventListener('click', () => this.switchBank(key));
                //     tab.addEventListener('touchend', (e) => {
                //         e.preventDefault();
                //         this.switchBank(key);
                //     });
                //     tabsContainer.appendChild(tab);
                // });

                const padNames = [
                    'KICK',
                    'SNARE',
                    'CLAP',
                    'HIHAT',
                    'TOM',
                    'CLAVES',
                    'AWYEAH',
                    'CRASH',
                    'KEYS 1',
                    'KEYS 2',
                    'KEYS 3',
                    'KEYS 4',
                    '808 1',
                    '808 2',
                    '808 3',
                    '808 4'
                ];

                for (let i = 0; i < 16; i++) {
                    const pad = document.createElement('button');
                    pad.className = 'pad';
                    pad.dataset.padIndex = i;

                    // Use custom name
                    pad.innerHTML = `<span class="pad-label">${padNames[i]}</span>`;

                    pad.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.triggerPad(i);
                    }, { passive: false });

                    pad.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        this.triggerPad(i);
                    });

                    const pressPad = () => pad.classList.add('pressed');
                    const releasePad = () => pad.classList.remove('pressed');

                    pad.addEventListener('touchstart', () => pressPad(), { passive: true });
                    pad.addEventListener('touchend', () => releasePad(), { passive: true });
                    pad.addEventListener('touchcancel', () => releasePad(), { passive: true });
                    pad.addEventListener('mousedown', () => pressPad());
                    pad.addEventListener('mouseup', () => releasePad());
                    pad.addEventListener('mouseleave', () => releasePad());

                    gridContainer.appendChild(pad);
                    this.pads.push(pad);
                }

                const volSlider = document.getElementById('volumeSlider');
                volSlider.addEventListener('input', () => {
                    this.volume = volSlider.value / 100;
                    if (this.masterGain) {
                        this.masterGain.gain.value = this.volume;
                    }
                });
            }

            setupKeyboard() {
                // === CHANGED: 16 keys in 4 rows of 4 ===
                // Row 1: 1 2 3 4   → pads 0-3
                // Row 2: Q W E R   → pads 4-7
                // Row 3: A S D F   → pads 8-11
                // Row 4: Z X C V   → pads 12-15
                const keyMap = {
                    '1': 0, '2': 1, '3': 2, '4': 3,
                    'q': 4, 'w': 5, 'e': 6, 'r': 7,
                    'a': 8, 's': 9, 'd': 10, 'f': 11,
                    'z': 12, 'x': 13, 'c': 14, 'v': 15,
                };

                const pressedKeys = new Set();

                document.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase();
                    if (keyMap[key] !== undefined && !pressedKeys.has(key)) {
                        pressedKeys.add(key);
                        this.triggerPad(keyMap[key]);
                        const pad = this.pads[keyMap[key]];
                        if (pad) pad.classList.add('pressed');
                    }
                });

                document.addEventListener('keyup', (e) => {
                    const key = e.key.toLowerCase();
                    pressedKeys.delete(key);
                    if (keyMap[key] !== undefined) {
                        const pad = this.pads[keyMap[key]];
                        if (pad) pad.classList.remove('pressed');
                    }
                });
            }

            async loadBank(bankName) {
                if (this.loadedBanks.has(bankName)) return;

                const bank = SOUNDBANKS[bankName];
                if (!bank) return;

                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                statusDot.className = 'status-dot loading';
                statusText.textContent = `Loading ${bank.name}...`;

                // === CHANGED: allocate 16 instead of 8 ===
                this.buffers[bankName] = new Array(16).fill(null);

                const loadPromises = bank.sounds.map((path, i) => {
                    return this.loadSound(path, i, bankName);
                });

                await Promise.allSettled(loadPromises);

                this.loadedBanks.add(bankName);

                statusDot.className = 'status-dot ready';
                statusText.textContent = `Ready · ${bank.name}`;
            }

            async loadSound(path, index, bankName) {
                try {
                    const response = await fetch(path);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await this.audioCtx.decodeAudioData(arrayBuffer);
                    this.buffers[bankName][index] = audioBuffer;
                    return audioBuffer;
                } catch (err) {
                    console.warn(`Failed to load sound: ${path}`, err);
                    const silentBuffer = this.audioCtx.createBuffer(
                        1,
                        this.audioCtx.sampleRate * 0.05,
                        this.audioCtx.sampleRate
                    );
                    this.buffers[bankName][index] = silentBuffer;
                    return silentBuffer;
                }
            }

            triggerPad(index) {
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }

                const bankBuffers = this.buffers[this.currentBank];
                if (!bankBuffers || !bankBuffers[index]) return;

                const buffer = bankBuffers[index];
                const source = this.audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(this.masterGain);
                source.start(0);

                this.createRipple(index);

                if (navigator.vibrate) {
                    navigator.vibrate(15);
                }
            }

            createRipple(padIndex) {
                const pad = this.pads[padIndex];
                if (!pad) return;

                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const size = Math.max(pad.offsetWidth, pad.offsetHeight);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                ripple.style.marginLeft = -(size / 2) + 'px';
                ripple.style.marginTop = -(size / 2) + 'px';
                pad.appendChild(ripple);

                setTimeout(() => ripple.remove(), 500);
            }

            async switchBank(bankName) {
                if (bankName === this.currentBank) return;

                await this.loadBank(bankName);
                this.currentBank = bankName;
                this.updateActiveTab(bankName);

                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                statusDot.className = 'status-dot ready';
                statusText.textContent = `Ready · ${SOUNDBANKS[bankName].name}`;

                this.pads.forEach((pad) => {
                    pad.style.transition = 'opacity 0.15s';
                    pad.style.opacity = '0.5';
                    setTimeout(() => {
                        pad.style.opacity = '1';
                    }, 150);
                });
            }

            updateActiveTab(bankName) {
                document.querySelectorAll('.bank-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.bank === bankName);
                });
            }

            /* === CHANGED: removed updatePadLabels — pads are static PAD1-PAD16 === */

            setupVisualizer() {
                const canvas = document.getElementById('visualizer');
                this.visualizerCtx = canvas.getContext('2d');
                this.drawVisualizer();
            }

            drawVisualizer() {
                const canvas = document.getElementById('visualizer');
                const ctx = this.visualizerCtx;
                const dpr = window.devicePixelRatio || 1;

                const resize = () => {
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                };
                resize();
                window.addEventListener('resize', resize);

                const bufferLength = this.analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                const draw = () => {
                    this.animFrameId = requestAnimationFrame(draw);
                    this.analyser.getByteFrequencyData(dataArray);
                    const w = canvas.width / dpr;
                    const h = canvas.height / dpr;
                    ctx.clearRect(0, 0, w, h);

                    const barCount = 32;
                    const barWidth = (w / barCount) - 2;
                    const step = Math.floor(bufferLength / barCount);

                    for (let i = 0; i < barCount; i++) {
                        const value = dataArray[i * step];
                        const barHeight = (value / 255) * h * 0.9;

                        const gradient = ctx.createLinearGradient(0, h, 0, h - barHeight);
                        gradient.addColorStop(0, 'rgba(108, 92, 231, 0.8)');
                        gradient.addColorStop(1, 'rgba(253, 121, 168, 0.6)');

                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.roundRect(
                            i * (barWidth + 2),
                            h - barHeight,
                            barWidth,
                            barHeight,
                            2
                        );
                        ctx.fill();
                    }
                };

                draw();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.drumMachine = new DrumMachine();
        });
    </script>
</body>
