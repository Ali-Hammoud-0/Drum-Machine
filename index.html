<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BeatForge Drum Machine</title>
<style>
  /* ============================================
     SOUND FILE SETUP GUIDE
     ============================================

     1. Create a folder named "sounds" in the same
        directory as this HTML file.

     2. Inside "sounds/", create subfolders for each
        bank: "classic", "electronic", "808", etc.

     3. Each bank needs exactly 8 audio files named:
        pad1.wav, pad2.wav, pad3.wav, pad4.wav,
        pad5.wav, pad6.wav, pad7.wav, pad8.wav

     4. Supported formats: WAV (recommended), MP3,
        OGG, FLAC. WAV gives lowest latency.

     5. Keep files short (1-2 seconds max) for
        faster loading and minimal memory usage.

     Example structure:
     └── your-project/
         ├── index.html          (this file)
         └── sounds/
             ├── classic/
             │   ├── pad1.wav    (kick)
             │   ├── pad2.wav    (snare)
             │   ├── pad3.wav    (hihat closed)
             │   ├── pad4.wav    (clap)
             │   ├── pad5.wav    (tom)
             │   ├── pad6.wav    (ride)
             │   ├── pad7.wav    (cowbell)
             │   └── pad8.wav    (crash)
             ├── electronic/
             │   └── ... (same pattern)
             └── 808/
                 └── ... (same pattern)

     ============================================ */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a2e;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --accent-bright: #fd79a8;
    --text-primary: #f0f0f5;
    --text-secondary: #8888aa;
    --pad-default: #1e1e35;
    --pad-active: #6c5ce7;
    --success: #00cec9;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* --- HEADER --- */
  header {
    width: 100%;
    max-width: 500px;
    padding: 20px 16px 10px;
    text-align: center;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent-glow), var(--accent-bright));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* --- STATUS BAR --- */
  .status-bar {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  .status-dot.ready {
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
  }

  .status-dot.loading {
    background: #fdcb6e;
    animation: pulse-dot 1s infinite;
  }

  .status-dot.error {
    background: #e17055;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .volume-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .volume-control svg {
    width: 16px;
    height: 16px;
    fill: var(--text-secondary);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: #333;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent-glow);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(108, 92, 231, 0.5);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent-glow);
    cursor: pointer;
    border: none;
  }

  /* --- BANK SELECTOR --- */
  .bank-selector {
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
    margin-bottom: 12px;
  }

  .bank-tabs {
    display: flex;
    gap: 6px;
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 4px;
  }

  .bank-tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  .bank-tab::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    opacity: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-bright));
    transition: opacity 0.3s;
  }

  .bank-tab span {
    position: relative;
    z-index: 1;
  }

  .bank-tab.active {
    color: #fff;
  }

  .bank-tab.active::before {
    opacity: 1;
  }

  .bank-tab:active {
    transform: scale(0.96);
  }

  /* --- PADS GRID --- */
  .pads-container {
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .pads-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 12px;
    aspect-ratio: 2 / 1;
  }

  .pad {
    position: relative;
    border: none;
    border-radius: 16px;
    background: var(--pad-default);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    outline: none;
  }

  .pad .pad-label {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 2;
    transition: color 0.2s;
  }

  .pad .pad-icon {
    font-size: 1.5rem;
    z-index: 2;
    transition: transform 0.15s ease, filter 0.15s ease;
  }

  .pad::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.15s ease;
    background: radial-gradient(circle at center, var(--accent-glow), var(--accent));
  }

  .pad::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
    opacity: 0;
  }

  .pad.pressed {
    transform: scale(0.93);
    box-shadow: 0 0 30px rgba(108, 92, 231, 0.4), inset 0 0 20px rgba(108, 92, 231, 0.2);
  }

  .pad.pressed::before {
    opacity: 1;
  }

  .pad.pressed::after {
    width: 200%;
    height: 200%;
    opacity: 0;
  }

  .pad.pressed .pad-icon {
    transform: scale(1.2);
    filter: brightness(1.5);
  }

  .pad.pressed .pad-label {
    color: #fff;
  }

  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    transform: scale(0);
    animation: ripple-anim 0.5s ease-out;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes ripple-anim {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  /* --- KEYBOARD HINTS --- */
  .keyboard-hints {
    width: 100%;
    max-width: 500px;
    padding: 16px;
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-secondary);
    opacity: 0.6;
  }

  .keyboard-hints kbd {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid #444;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.65rem;
    background: #222;
    margin: 0 1px;
  }

  /* --- FOOTER --- */
  footer {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px 20px;
    text-align: center;
    font-size: 0.65rem;
    color: var(--text-secondary);
    opacity: 0.4;
  }

  /* --- LOADING OVERLAY --- */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loader {
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 0.85rem;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }

  /* --- VISUALIZER --- */
  .visualizer {
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .visualizer canvas {
    width: 100%;
    height: 40px;
    border-radius: 8px;
    opacity: 0.5;
  }

  /* --- RESPONSIVE --- */
  @media (max-height: 600px) {
    .pads-grid {
      aspect-ratio: auto;
      gap: 8px;
    }
    .pad {
      padding: 8px;
    }
  }

  @media (min-width: 500px) {
    .pads-grid {
      gap: 16px;
    }
    .pad .pad-icon {
      font-size: 1.8rem;
    }
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text">LOADING</div>
</div>

<!-- Header -->
<header>
  <div class="logo">⬡ BEATFORGE</div>
  <div class="subtitle">Drum Machine</div>
</header>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-indicator">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading sounds...</span>
  </div>
  <div class="volume-control">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73
2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49
7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <input type="range" id="volumeSlider" min="0" max="100" value="80">
  </div>
</div>

<!-- Bank Selector -->
<div class="bank-selector">
  <div class="bank-tabs" id="bankTabs">
    <!-- Tabs injected by JS -->
  </div>
</div>

<!-- Visualizer -->
<div class="visualizer">
  <canvas id="visualizer"></canvas>
</div>

<!-- Pads -->
<div class="pads-container">
  <div class="pads-grid" id="padsGrid">
    <!-- Pads injected by JS -->
  </div>
</div>

<!-- Keyboard Hints -->
<div class="keyboard-hints">
  Keyboard: <kbd>1</kbd>–<kbd>8</kbd> or
<kbd>Q</kbd><kbd>W</kbd><kbd>E</kbd><kbd>R</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd>
</div>

<footer>Tap pads or use keyboard · Add your sounds to the sounds/ folder</footer>

<script>
/* ============================================
   SOUND CONFIGURATION
   ============================================

   EDIT THIS OBJECT TO ADD/REMOVE BANKS AND
   CUSTOMIZE SOUND FILE PATHS.

   Each bank has:
   - name: display name
   - icon: emoji icon
   - sounds: array of 8 file paths

   FILES SHOULD BE: .wav (best), .mp3, .ogg, .flac
   ============================================ */
const SOUNDBANKS = {
  classic: {
    name: 'Classic',
    icon: '🥁',
    sounds: [
      'sounds/classic/pad1.wav',  // Kick
      'sounds/classic/pad2.wav',  // Snare
      'sounds/classic/pad3.wav',  // Hi-Hat Closed
      'sounds/classic/pad4.wav',  // Clap
      'sounds/classic/pad5.wav',  // Tom
      'sounds/classic/pad6.wav',  // Ride
      'sounds/classic/pad7.wav',  // Cowbell
      'sounds/classic/pad8.wav',  // Crash
    ],
    labels: ['KICK', 'SNARE', 'HIHAT', 'CLAP', 'TOM', 'RIDE', 'CWBELL', 'CRASH'],
    icons: ['⚡', '💥', '🔔', '👏', '🎵', '🎶', '🔕', '💫']
  },
  electronic: {
    name: 'Electronic',
    icon: '🎹',
    sounds: [
      'sounds/electronic/pad1.wav',  // Sub Kick
      'sounds/electronic/pad2.wav',  // Snap
      'sounds/electronic/pad3.wav',  // Noise
      'sounds/electronic/pad4.wav',  // Pluck
      'sounds/electronic/pad5.wav',  // Bass
      'sounds/electronic/pad6.wav',  // Synth Hit
      'sounds/electronic/pad7.wav',  // FX
      'sounds/electronic/pad8.wav',  // Sweep
    ],
    labels: ['SUB', 'SNAP', 'NOISE', 'PLUCK', 'BASS', 'SYNTH', 'FX', 'SWEEP'],
    icons: ['🔊', '✨', '🌊', '🎸', '🎛️', '🎹', '⚙️', '🌀']
  },
  eighties: {
    name: '808',
    icon: '🎛️',
    sounds: [
      'sounds/808/pad1.wav',   // 808 Kick
      'sounds/808/pad2.wav',   // 808 Snare
      'sounds/808/pad3.wav',   // 808 Hihat
      'sounds/808/pad4.wav',   // 808 Clap
      'sounds/808/pad5.wav',   // 808 Tom
      'sounds/808/pad6.wav',   // 808 Ride
      'sounds/808/pad7.wav',   // 808 FX
      'sounds/808/pad8.wav',   // 808 Crash
    ],
    labels: ['808K', '808S', '808H', '808C', '808T', '808R', '808F', '808CR'],
    icons: ['💣', '🔥', '💎', '🌟', '🎯', '🎪', '🚀', '💥']
  }
};

/* ============================================
   DRUM MACHINE ENGINE
   ============================================ */
class DrumMachine {
  constructor() {
    this.audioCtx = null;
    this.masterGain = null;
    this.analyser = null;
    this.buffers = {};   // bankName -> [AudioBuffer, ...]
    this.currentBank = null;
    this.loadedBanks = new Set();
    this.volume = 0.8;
    this.isInitialized = false;

    this.pads = [];
    this.visualizerCtx = null;
    this.animFrameId = null;

    this.init();
  }

  async init() {
    this.setupAudio();
    this.setupUI();
    this.setupKeyboard();
    this.setupVisualizer();

    // Load initial bank
    const firstBank = Object.keys(SOUNDBANKS)[0];
    await this.loadBank(firstBank);
    this.currentBank = firstBank;
    this.updateActiveTab(firstBank);

    // Hide loading overlay
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }, 600);
  }

  setupAudio() {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    this.audioCtx = new AudioCtx();

    this.masterGain = this.audioCtx.createGain();
    this.masterGain.gain.value = this.volume;

    this.analyser = this.audioCtx.createAnalyser();
    this.analyser.fftSize = 256;

    this.masterGain.connect(this.analyser);
    this.analyser.connect(this.audioCtx.destination);
  }

  setupUI() {
    const tabsContainer = document.getElementById('bankTabs');
    const gridContainer = document.getElementById('padsGrid');

    // Build bank tabs
    Object.entries(SOUNDBANKS).forEach(([key, bank]) => {
      const tab = document.createElement('button');
      tab.className = 'bank-tab';
      tab.dataset.bank = key;
      tab.innerHTML = `<span>${bank.icon} ${bank.name}</span>`;
      tab.addEventListener('click', () => this.switchBank(key));
      tab.addEventListener('touchend', (e) => {
        e.preventDefault();
        this.switchBank(key);
      });
      tabsContainer.appendChild(tab);
    });

    // Build pads
    for (let i = 0; i < 8; i++) {
      const pad = document.createElement('button');
      pad.className = 'pad';
      pad.dataset.padIndex = i;
      pad.innerHTML = `
        <span class="pad-icon" id="padIcon${i}">🥁</span>
        <span class="pad-label" id="padLabel${i}">PAD ${i + 1}</span>
      `;

      // Touch events for zero latency
      pad.addEventListener('touchstart', (e) => {
        e.preventDefault();
        this.triggerPad(i);
      }, { passive: false });

      pad.addEventListener('mousedown', (e) => {
        e.preventDefault();
        this.triggerPad(i);
      });

      // Visual press
      const pressPad = () => pad.classList.add('pressed');
      const releasePad = () => pad.classList.remove('pressed');

      pad.addEventListener('touchstart', () => pressPad(), { passive: true });
      pad.addEventListener('touchend', () => releasePad(), { passive: true });
      pad.addEventListener('touchcancel', () => releasePad(), { passive: true });
      pad.addEventListener('mousedown', () => pressPad());
      pad.addEventListener('mouseup', () => releasePad());
      pad.addEventListener('mouseleave', () => releasePad());

      gridContainer.appendChild(pad);
      this.pads.push(pad);
    }

    // Volume slider
    const volSlider = document.getElementById('volumeSlider');
    volSlider.addEventListener('input', () => {
      this.volume = volSlider.value / 100;
      if (this.masterGain) {
        this.masterGain.gain.value = this.volume;
      }
    });

    // Update pad labels for current bank
    this.updatePadLabels();
  }

  setupKeyboard() {
    // Key mappings: 1-8 and Q,W,E,R,A,S,D,F
    const keyMap = {
      '1': 0, '2': 1, '3': 2, '4': 3,
      '5': 4, '6': 5, '7': 6, '8': 7,
      'q': 0, 'w': 1, 'e': 2, 'r': 3,
      'a': 4, 's': 5, 'd': 6, 'f': 7,
    };

    const pressedKeys = new Set();

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (keyMap[key] !== undefined && !pressedKeys.has(key)) {
        pressedKeys.add(key);
        this.triggerPad(keyMap[key]);
        // Visual press
        const pad = this.pads[keyMap[key]];
        if (pad) pad.classList.add('pressed');
      }
    });

    document.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      pressedKeys.delete(key);
      if (keyMap[key] !== undefined) {
        const pad = this.pads[keyMap[key]];
        if (pad) pad.classList.remove('pressed');
      }
    });
  }

  async loadBank(bankName) {
    if (this.loadedBanks.has(bankName)) return;

    const bank = SOUNDBANKS[bankName];
    if (!bank) return;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    statusDot.className = 'status-dot loading';
    statusText.textContent = `Loading ${bank.name}...`;

    // Pre-allocate array for this bank
    this.buffers[bankName] = new Array(8).fill(null);

    // Pass bankName explicitly to loadSound
    const loadPromises = bank.sounds.map((path, i) => {
      return this.loadSound(path, i, bankName);
    });

    await Promise.allSettled(loadPromises);

    this.loadedBanks.add(bankName);

    statusDot.className = 'status-dot ready';
    statusText.textContent = `Ready · ${bank.name}`;
  }

   async loadSound(path, index, bankName) {
    try {
      const response = await fetch(path);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const arrayBuffer = await response.arrayBuffer();
      const audioBuffer = await this.audioCtx.decodeAudioData(arrayBuffer);

      // ✅ FIX: Save to the correct bank, not this.currentBank
      this.buffers[bankName][index] = audioBuffer;
      return audioBuffer;
    } catch (err) {
      // ✅ FIX: Log the REAL error so you can debug CORS, 404s, or decode failures
      console.warn(`Failed to load sound: ${path}`, err);

      const silentBuffer = this.audioCtx.createBuffer(
        1,
        this.audioCtx.sampleRate * 0.05,
        this.audioCtx.sampleRate
      );
      this.buffers[bankName][index] = silentBuffer;
      return silentBuffer;
    }
  }
  triggerPad(index) {
    // Resume context if suspended (autoplay policy)
    if (this.audioCtx.state === 'suspended') {
      this.audioCtx.resume();
    }

    const bankBuffers = this.buffers[this.currentBank];
    if (!bankBuffers || !bankBuffers[index]) return;

    const buffer = bankBuffers[index];
    const source = this.audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(this.masterGain);
    source.start(0);

    // Ripple effect
    this.createRipple(index);

    // Haptic feedback on mobile
    if (navigator.vibrate) {
      navigator.vibrate(15);
    }
  }

  createRipple(padIndex) {
    const pad = this.pads[padIndex];
    if (!pad) return;

    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(pad.offsetWidth, pad.offsetHeight);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = '50%';
    ripple.style.top = '50%';
    ripple.style.marginLeft = -(size / 2) + 'px';
    ripple.style.marginTop = -(size / 2) + 'px';
    pad.appendChild(ripple);

    setTimeout(() => ripple.remove(), 500);
  }

  async switchBank(bankName) {
    if (bankName === this.currentBank) return;

    await this.loadBank(bankName);
    this.currentBank = bankName;
    this.updateActiveTab(bankName);
    this.updatePadLabels();

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    statusDot.className = 'status-dot ready';
    statusText.textContent = `Ready · ${SOUNDBANKS[bankName].name}`;

    // Animate bank switch
    this.pads.forEach((pad, i) => {
      pad.style.transition = 'opacity 0.15s';
      pad.style.opacity = '0.5';
      setTimeout(() => {
        pad.style.opacity = '1';
      }, 150);
    });
  }

  updateActiveTab(bankName) {
    document.querySelectorAll('.bank-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.bank === bankName);
    });
  }

  updatePadLabels() {
    const bank = SOUNDBANKS[this.currentBank];
    if (!bank) return;

    for (let i = 0; i < 8; i++) {
      const labelEl = document.getElementById(`padLabel${i}`);
      const iconEl = document.getElementById(`padIcon${i}`);
      if (labelEl) labelEl.textContent = bank.labels[i] || `PAD ${i + 1}`;
      if (iconEl) iconEl.textContent = bank.icons[i] || '🥁';
    }
  }

  setupVisualizer() {
    const canvas = document.getElementById('visualizer');
    this.visualizerCtx = canvas.getContext('2d');
    this.drawVisualizer();
  }

  drawVisualizer() {
    const canvas = document.getElementById('visualizer');
    const ctx = this.visualizerCtx;
    const dpr = window.devicePixelRatio || 1;

    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
    };
    resize();
    window.addEventListener('resize', resize);

    const bufferLength = this.analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    const draw = () => {
      this.animFrameId = requestAnimationFrame(draw);
      this.analyser.getByteFrequencyData(dataArray);

      const w = canvas.width / dpr;
      const h = canvas.height / dpr;

      ctx.clearRect(0, 0, w, h);

      const barCount = 32;
      const barWidth = (w / barCount) - 2;
      const step = Math.floor(bufferLength / barCount);

      for (let i = 0; i < barCount; i++) {
        const value = dataArray[i * step];
        const barHeight = (value / 255) * h * 0.9;

        const gradient = ctx.createLinearGradient(0, h, 0, h - barHeight);
        gradient.addColorStop(0, 'rgba(108, 92, 231, 0.8)');
        gradient.addColorStop(1, 'rgba(253, 121, 168, 0.6)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(
          i * (barWidth + 2),
          h - barHeight,
          barWidth,
          barHeight,
          2
        );
        ctx.fill();
      }
    };

    draw();
  }
}

/* ============================================
   INITIALIZE ON DOM READY
   ============================================ */
document.addEventListener('DOMContentLoaded', () => {
  window.drumMachine = new DrumMachine();
});
</script>
